<div class="set-container">
  <!-- Image -->
  <div class="set-image {{gameCode}}-rarity-{{set.rarity}}">
    <img [src]="set.imageUrl ?? unknownImg" height="70" />
  </div>
  <!-- Info -->
  <div class="set-info" [ngbPopover]="setEffectPopover" [popoverTitle]="set.name" popoverClass="gagu-popover"
      [disablePopover]="effectStyle != 'popover' || setEffectsList.length == 0" container="body">
    <span *ngIf="equppiedPieces" class="equppied-pieces">({{equppiedPieces}})</span>
    <h5 class="set-name">
      {{set.name}}
    </h5>
  </div>
  <!-- Effect (box) - Trigger -->
  <div *ngIf="effectStyle == 'box' && setEffectsList.length > 0" class="pointer effect-arrow collapsed"
      data-bs-toggle="collapse" [attr.data-bs-target]="'#'+setId+'effect'">
    <img src="assets/svg/arrow-down.svg" height="20">
  </div>
  <!-- Effect (box) -->
  <div *ngIf="effectStyle == 'box' && setEffectsList.length > 0" class="set-effect collapse"
      id="{{setId}}effect" data-bs-parent="#sets-container">
    <div *ngFor="let eff of setEffectsList" class="effect-item">
      <b class="effect-label">{{ eff.label }}:</b>
      <span [innerHTML]="eff.formattedDescription"></span>
    </div>
  </div>
</div>

<!-- Effect (popover) -->
<ng-template #setEffectPopover>
  <div class="set-effect">
    <div *ngFor="let eff of setEffectsList" class="effect-item">
      <b class="effect-label">{{ eff.label }}:</b>
      <span [innerHTML]="eff.formattedDescription"></span>
    </div>
  </div>
</ng-template>
